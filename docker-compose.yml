services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: xarchiver
      POSTGRES_USER: xarchiver
      POSTGRES_PASSWORD: xarchiver_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xarchiver -d xarchiver"]
      interval: 5s
      timeout: 5s
      retries: 10

  xarchiver:
    build:
      context: ./cli
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://xarchiver:xarchiver_dev_password@postgres:5432/xarchiver}
      ARCHIVE_DIR: ${ARCHIVE_DIR:-/app/archive}
      COOKIE_FILE: ${COOKIE_FILE:-/app/secrets/cookies.txt}
      DEFAULT_DOWNLOAD_ENGINE: ${DEFAULT_DOWNLOAD_ENGINE:-gallery-dl}
      RETRY_LIMIT: ${RETRY_LIMIT:-3}
    volumes:
      - ./archive:/app/archive
      - ./examples:/app/examples
      - ./secrets:/app/secrets:ro
      - ./sql:/app/sql:ro
      - ./docs:/app/docs:ro
      - ./cli/xarchiver:/app/xarchiver
      - ./cli/tests:/app/tests
      - ./cli/gallery-dl.conf:/app/gallery-dl.conf:ro
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
